services:
  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    image: smartlogix/discovery-service:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: smartlogix/auth-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    expose:
      - "8084"

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    image: smartlogix/inventory-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    expose:
      - "8081"

  shipment-service:
    build:
      context: .
      dockerfile: shipment-service/Dockerfile
    image: smartlogix/shipment-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 35s
    expose:
      - "8083"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    image: smartlogix/order-service:latest
    depends_on:
      discovery-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    expose:
      - "8082"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: smartlogix/api-gateway:latest
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      shipment-service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    ports:
      - "8080:8080"
